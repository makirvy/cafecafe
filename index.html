<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Cafetería POS</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="estilos.css">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6f4e37">

</head>

<body class="h-screen flex flex-col select-none">

<!-- NAV -->
<nav class="flex justify-between items-center px-4 py-3 sombra-cafe">

<div class="flex items-center gap-3">
<img src="icon-192.png" class="w-8 h-8 rounded-full sombra-cafe">
<h1 class="font-black text-lg">CAFETERÍA</h1>
</div>

<div class="flex gap-4 text-xl">
<button onclick="cambiarVista('caja')">🛒</button>
<button onclick="cambiarVista('reportes')">📊</button>
</div>

<div id="reloj" class="text-sm">00:00</div>

</nav>

<!-- CAJA -->
<main id="vista-caja" class="flex-1 flex flex-col md:flex-row overflow-hidden">

<!-- PRODUCTOS -->
<section class="w-full md:w-2/3 p-3 overflow-y-auto">

<div id="filtros-categorias" class="flex gap-2 mb-3 overflow-x-auto"></div>

<div id="grid-productos" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3"></div>

</section>

<!-- CARRITO -->
<section class="w-full md:w-1/3 flex flex-col borde-izq">

<div class="p-3 flex justify-between font-bold">
<span>PEDIDO</span>
<button onclick="limpiarPedido()">🗑️</button>
</div>

<div id="lista-pedido" class="flex-1 p-3 overflow-y-auto"></div>

<div class="p-3 space-y-2 fondo-caja">

<div class="flex justify-between">
<span>TOTAL</span>
<span id="total-pagar" class="text-2xl font-black">$0.00</span>
</div>

<input type="number" id="efectivo-recibido" placeholder="Efectivo"
class="w-full p-2 rounded text-lg text-center">

<div id="cambio-vuelto" class="text-center font-bold">
VUELTO: $0.00
</div>

<div class="grid grid-cols-2 gap-2">
<button onclick="finalizarVenta('Efectivo')" class="btn-verde">EFECTIVO</button>
<button onclick="finalizarVenta('Yappy')" class="btn-azul">YAPPY</button>
</div>

</div>
</section>

</main>

<!-- REPORTES -->
<main id="vista-reportes" class="hidden flex-1 p-4 overflow-y-auto">

<div class="grid grid-cols-3 gap-3 mb-4 text-center">
<div class="card"><p>Efectivo</p><p id="resumen-efectivo">$0.00</p></div>
<div class="card"><p>Yappy</p><p id="resumen-yappy">$0.00</p></div>
<div class="card"><p>Total</p><p id="resumen-total">$0.00</p></div>
</div>

<div class="card mb-6">
<table class="w-full">
<thead><tr><th>Hora</th><th>Productos</th><th>Método</th><th>Total</th></tr></thead>
<tbody id="tabla-ventas-cuerpo"></tbody>
</table>
</div>

<div class="card">
<h3 class="mb-2 font-bold">INVENTARIO</h3>
<table class="w-full">
<thead><tr><th>Producto</th><th>Tipo</th><th>Stock</th><th>+</th></tr></thead>
<tbody id="tabla-inventario"></tbody>
</table>
</div>

</main>

<!-- MODAL -->
<div id="modal-variaciones" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center">
<div class="bg-white p-4 rounded w-72">
<h3 id="modal-titulo" class="mb-3 font-bold"></h3>
<div id="opciones-variacion"></div>
<button onclick="cerrarModal()" class="mt-3">Cerrar</button>
</div>
</div>

<script src="app.js"></script>
</body>
</html>
